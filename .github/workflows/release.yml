name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: azureal-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: azureal-macos-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: azureal-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: azureal-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y cmake libdbus-1-dev pkg-config libasound2-dev

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/azureal ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/azureal.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body: |
            ## Installation

            Download the binary for your platform and place it in your PATH:

            ### macOS (Apple Silicon)
            ```bash
            curl -L https://github.com/xCORViSx/AZUREAL/releases/download/${{ github.ref_name }}/azureal-macos-arm64 -o /usr/local/bin/azureal
            chmod +x /usr/local/bin/azureal
            ```

            ### macOS (Intel)
            ```bash
            curl -L https://github.com/xCORViSx/AZUREAL/releases/download/${{ github.ref_name }}/azureal-macos-x64 -o /usr/local/bin/azureal
            chmod +x /usr/local/bin/azureal
            ```

            ### Linux (x64)
            ```bash
            curl -L https://github.com/xCORViSx/AZUREAL/releases/download/${{ github.ref_name }}/azureal-linux-x64 -o /usr/local/bin/azureal
            chmod +x /usr/local/bin/azureal
            ```

            ### Windows (x64)
            Download `azureal-windows-x64.exe` and place it in a directory on your `PATH` (e.g., `C:\Users\<you>\bin\`), or add its location to your PATH environment variable.
